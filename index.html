<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./output.css" rel="stylesheet">
    <title>Tailwind Css</title>
</head>
<body>
  <!-- Global Container -->
    <div class="flex items-center justify-center min-h-screen bg-slate-100">
      <!-- Card Container -->
      <div class="flex flex-col md:flex-row md:space-y-0 md:m-0 md:p-16 md-space-x-10 shadow-2xl bg-white p-6 m-3 space-y-10 rounded-2xl">
        <!-- Image Container -->
        <div class="max-[300px] md:pr-4">
          <img src="images/bookcover.webp" class="mx-auto rounded-xl hover:scale-105 duration-200 w-60" alt="">
        </div>
        <!-- Content Container -->
        <div class="flex flex-col space-y-6">
          <!-- Label and Title Container  -->
           <div class="flex flex-col mb-4 space-y-3 text-center md:text-left">
            
            <!-- Title Container -->
             <div class="max-w-sm text-2xl font-medium">
              Title: Thus Spoke Zarathustra
             </div>
             <!-- Price Container -->
             <div class="flex flex-col mb-4 space-y-3 text-center md:text-left">
              <p class="line-through">$19.9</p>
              <p class="text-5xl font-bold">$9.9</p>
              <p class="text-sm font-light text-gray-400">This Offer Valid until April 3rd or as long as stock lasts!</p>
             </div>
             <!-- Buttons Group -->
              <div class="group">
                <button class="duration-150 transition-all w-full bg-stone-700 text-white border-b-8 border-b-stone-700 rounded-lg group-hover:border-t-8 group-hover:border-b-0 group-hover:bg-stone-700 group-hover:border-t-stone-700 group-hover:shadow-lg">
                  <div class="duration-150 px-8 py-4 bg-stone-500 rounded-lg group-hover:bg-stone-700">
                    add to card
                  </div>
                </button>
              </div>
             
              <!-- Stock and Shipping -->
              <div class="flex items-center justify-center space-x-3 group">
                <div class="w-3 h-3 bg-emerald-400 rounded-full group-hover:animate-ping"></div>
                <div class="text-sm">50+ pcs. in stock</div>
                <div class="w-3 h-3 bg-emerald-400 rounded-full group-hover:animate-ping"></div>
                <div class="text-sm">Free Shipping</div>
              </div>
              <!-- Bottom Buttons Container -->
               <div class="flex flex-col space-y-4 md:space-y-0 md:space-x-4 md:flex-row">
                <button class="flex items-center justify-center py-3 px-5 space-x-3 border-2 border-gray-300 rounded-lg shadow-sm hover:bg-opacity-30 hover:shadow-lg hover:translate-y-0.5 transition-all duration-150">
                  <img src="images/weight.png" class="w-8" alt="">
                  <span>Add to cart</span>
                </button>
                <button class="flex items-center justify-center py-3 px-5 space-x-3 border-2 border-gray-300 rounded-lg shadow-sm hover:bg-opacity-30 hover:shadow-lg hover:translate-y-0.5 transition-all duration-150">
                  <img src="images/heart.png" class="w-8" alt="">
                  <span>Add to wishlist</span>
                </button>
               </div>
              
           </div>

         </div>
      </div>
    </div>
</body>
</html>
